<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>토큰 계산기 - Prompt Lab</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .modal-overlay { display: flex !important; position: static; background: transparent; backdrop-filter: none; min-height: calc(100vh - 64px); align-items: center; justify-content: center; padding-top: 64px; }
    .auth-content { position: static; transform: none; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .close-auth-btn { display: none !important; }
    #floating-toolkit { display: none !important; }
  </style>
</head>
<body data-bg="dark" data-color="cyan">
  <header class="nav-header">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><span class="nav-logo__bracket">[</span> Prompt Lab <span class="nav-logo__bracket">]</span></a>
      <div class="nav-right"><a href="index.html" class="nav-btn nav-btn--ghost">← 메인으로 돌아가기</a></div>
    </div>
  </header>
  
  <main class="modal-overlay">
    <div class="auth-content" style="width: 500px; padding: 40px;">
      <h2 style="font-size: 1.5rem; margin-bottom: 1rem; color: var(--neon-cyan);">📊 Live Token Counter</h2>
      <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">입력창에 프롬프트를 입력하면 실시간으로 API 비용이 산정됩니다.</p>
      <div style="text-align: left; display:flex; flex-direction:column; gap:15px;">
        <textarea id="token-textarea" class="auth-input" rows="8" placeholder="여기에 아무 문장이나 복사 붙여넣기 해보세요..." style="resize:none; font-family:var(--font-mono); font-size:0.9rem; background: var(--bg-base); color: var(--text-primary);"></textarea>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:5px;">
          <div style="background:var(--bg-base); padding:15px; border-radius:8px; border:1px solid var(--border-subtle);">
            <span style="font-size:0.75rem; color:var(--text-muted); display:block;">공백 포함 글자 수</span>
            <strong id="stat-chars" style="font-size:1.3rem; color:var(--text-primary);">0</strong> 자
          </div>
          <div style="background:var(--bg-base); padding:15px; border-radius:8px; border:1px solid var(--border-subtle);">
            <span style="font-size:0.75rem; color:var(--text-muted); display:block;">예상 소모 토큰 수</span>
            <strong id="stat-tokens" style="font-size:1.3rem; color:var(--neon-cyan);">0</strong> tokens
          </div>
        </div>
        <div style="background:rgba(6, 182, 212, 0.05); border:1px solid var(--border-base); padding:15px; border-radius:8px; margin-top:5px; display:flex; flex-direction:column; gap:8px; font-size:0.85rem;">
          <div style="display:flex; justify-content:space-between; color: var(--text-primary);">
            <span>OpenAI GPT-4o 예상 비용:</span><strong id="cost-gpt" style="color:#22c55e;">$0.00000</strong>
          </div>
          <div style="display:flex; justify-content:space-between; color: var(--text-primary);">
            <span>Anthropic Claude 3.5 비용:</span><strong id="cost-claude" style="color:var(--neon-purple);">$0.00000</strong>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
